<div class="panel panel-default">
    <div class="panel-heading">
        <h3>  {{ editMode ? 'Edit Task' : 'New Task' }}</h3>
    </div>
    <div class="panel-body">
<form id="task-edit" (ngSubmit)="onSubmit(f)" #f="ngForm">
    <div class="row">
        <div class="col-sm-12 form-group">
            <label for="title">Task:</label>
            <input
                type="text"
                id="title"
                name="title"
                class="form-control required"
                [(ngModel)]="task.title"  
                #title="ngModel"
                required
                size="120"
                max="120"
            />
        </div>
    </div>
    <div class="row">
        <div class="col-sm-12 form-group">
          <label for="details">Details:</label>
          <textarea
                id="details"
                name="details"
                class="form-control"
                [(ngModel)]="task.details"
                #details="ngModel"
          ></textarea>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-6 form-group">
          <label for="chosenDate">Date:</label>
          <input
            type="date"
            id="chosenDate"
            name="chosenDate"
            class="form-control required"
            [value]="formattedDate"
            (input)="onDateChange($event)"
            required
            />
        </div>
      </div>
      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="startTime">Start Time:</label>
          <input
            type="time"
            id="startTime"
            name="startTime"
            class="form-control"
            [(ngModel)]="task.startTime"
            #startTime="ngModel"
          />
        </div>
      </div>
      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="endTime">End Time:</label>
          <input
            type="time"
            id="endTime"
            name="endTime"
            class="form-control"
            [(ngModel)]="task.endTime"
            #endTime="ngModel"
          />
        </div>
      </div>
    <div class="row">
    <div class="col-xs-12 btn-toolbar">
        <button class="btn btn-success" type="submit" [disabled]="!f.valid">Save</button>
        <button class="btn btn-primary" type="button" (click)="onCancel()">Cancel</button>
    </div>
    </div>
</form>
    </div>
</div>
